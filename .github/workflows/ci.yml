name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. 2026-b1)'
        required: true
        type: string

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. new pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format

      - name: Check formatting
        run: |
          find src tests \( -name '*.c' -o -name '*.h' \) \
            -not -path 'src/wayland/protocols/*' \
            -not -name 'greatest.h' \
            -print0 | xargs -0 clang-format --dry-run --Werror

  test:
    name: Test (${{ matrix.cc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        with:
          packages: ${{ matrix.cc == 'clang' && 'clang' || '' }}

      - name: Run tests
        run: make test CC=${{ matrix.cc }}

  sanitizers:
    name: Sanitizers (ASan + UBSan)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        with:
          packages: clang

      - name: Run tests with sanitizers
        run: make test CC=clang EXTRA_CFLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g"
        env:
          ASAN_OPTIONS: detect_leaks=1
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/.github/lsan.supp
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

  analyze:
    name: Static analysis
    needs: test
    runs-on: ubuntu-latest
    # Non-blocking: surfaces findings without failing the pipeline. Flip to
    # `false` (or remove) once the codebase is clean to make it enforcing.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        with:
          packages: clang-tidy cppcheck bear

      - name: Generate compile_commands.json
        run: bear -- make -B all

      - name: clang-tidy
        run: |
          find src -name '*.c' \
            -not -path 'src/wayland/protocols/*' \
            -print0 | xargs -0 clang-tidy -p .

      - name: cppcheck
        run: |
          cppcheck --enable=warning,performance,portability --inline-suppr \
            --std=c17 --error-exitcode=1 -Isrc \
            --suppress='*:src/wayland/protocols/*' \
            src

  build:
    name: Build
    needs: [format, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Build executable
        run: make

      # CI artifact for PRs and pushes to main.
      - name: Upload build artifact
        if: github.event_name != 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: baguette
          path: baguette
          if-no-files-found: error

  release:
    name: Release
    needs: [format, test, build]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Build executable
        run: make

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          generate_release_notes: true
          files: baguette
